<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Draper Viewer</title>
    <link data-trunk rel="rust" data-wasm-opt="2" data-cargo-no-default-features data-cargo-features="web" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1e1e28;
            width: 100%;
            height: 100%;
        }
        #the_canvas_id {
            width: 100%;
            height: 100vh;
            display: block;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #8899aa;
            font-size: 18px;
            text-align: center;
            z-index: 100;
        }
        #loading .spinner {
            width: 40px;
            height: 40px;
            margin: 16px auto;
            border: 3px solid rgba(136, 153, 170, 0.3);
            border-top: 3px solid #8899aa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        Loading 3Draper...
    </div>
    <canvas id="the_canvas_id"></canvas>
    <script>
        // Hide loading overlay once WASM initializes
        window.addEventListener("load", function() {
            setTimeout(function() {
                var loading = document.getElementById("loading");
                if (loading) loading.style.display = "none";
            }, 500);
        });
    </script>
</body>
</html>
